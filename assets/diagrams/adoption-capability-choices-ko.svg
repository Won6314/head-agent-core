<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">도입 역량 선택</title>
  <desc id="desc">직접 수행하는 HEAD가 기준선입니다. 오래 유지되는 run, 경계가 정해진 워커, 독립 검토, 호출 가능한 통합이라는 네 가지 선택 역량은 관찰된 작업에서 해당 필요가 생길 때 독립적으로 추가할 수 있습니다. 이것은 성숙도 사다리가 아니며 구성 요소가 많다고 더 좋은 시스템인 것은 아닙니다.</desc>
  <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.1"/></filter><style>.title{font:700 42px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#0f172a}.subtitle{font:400 20px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#475569}.eyebrow{font:700 15px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;letter-spacing:2px;fill:#16a34a}.region{font:700 22px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#0f172a}.card-title{font:700 22px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#0f172a}.body{font:400 16px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#64748b}.small{font:600 14px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#475569}.tag{font:700 12px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;letter-spacing:1px}.base-title{font:750 30px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#fff}.base-body{font:400 17px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#dcfce7}</style></defs>
  <rect width="1600" height="860" rx="36" fill="#f8fafc"/><path d="M0 0H1600V10H0z" fill="#16a34a"/><text x="64" y="72" class="eyebrow">맞는 최소 복잡성만 도입</text><text x="64" y="124" class="title">도입 역량 선택</text><text x="64" y="163" class="subtitle">역량은 관찰된 필요에 대응합니다. 조합 가능한 선택이지 올라가야 하는 단계가 아닙니다.</text>
  <g><rect x="1192" y="82" width="344" height="92" rx="24" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/><text x="1224" y="119" class="card-title">성숙도 사다리가 아님</text><text x="1224" y="148" class="body">구성 요소가 많다고 더 좋은 시스템은 아닙니다.</text></g>
  <rect x="116" y="222" width="1368" height="430" rx="32" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/><text x="152" y="266" class="region">선택 역량</text><text x="152" y="294" class="body">조정, 연속성, 검토, 인터페이스의 구체적 필요가 생길 때 하나씩 추가합니다.</text>
  <g filter="url(#shadow)"><rect x="152" y="326" width="620" height="136" rx="24" fill="#fff" stroke="#bbf7d0" stroke-width="2"/><rect x="180" y="350" width="78" height="26" rx="13" fill="#dcfce7"/><text x="219" y="368" text-anchor="middle" class="tag" fill="#15803d">선택</text><text x="180" y="409" class="card-title">오래 유지되는 run</text><text x="390" y="407" class="body">중단·인계를 견뎌야 할 때</text><text x="180" y="440" class="small">안정적 합의와 체크리스트를 추가하며 요약은 하위 기록으로 둡니다.</text></g>
  <g filter="url(#shadow)"><rect x="828" y="326" width="620" height="136" rx="24" fill="#fff" stroke="#bbf7d0" stroke-width="2"/><rect x="856" y="350" width="78" height="26" rx="13" fill="#dcfce7"/><text x="895" y="368" text-anchor="middle" class="tag" fill="#15803d">선택</text><text x="856" y="409" class="card-title">경계가 정해진 워커</text><text x="1088" y="407" class="body">별도 결과의 소유자가 분명할 때</text><text x="856" y="440" class="small">위임 준비와 통합 비용이 추가됩니다.</text></g>
  <g filter="url(#shadow)"><rect x="152" y="486" width="620" height="136" rx="24" fill="#fff" stroke="#bbf7d0" stroke-width="2"/><rect x="180" y="510" width="78" height="26" rx="13" fill="#dcfce7"/><text x="219" y="528" text-anchor="middle" class="tag" fill="#15803d">선택</text><text x="180" y="569" class="card-title">독립 검토</text><text x="330" y="567" class="body">별도 판단이 결과를 바꿀 때</text><text x="180" y="600" class="small">자동 승인 도장이 아니라 도전을 추가합니다.</text></g>
  <g filter="url(#shadow)"><rect x="828" y="486" width="620" height="136" rx="24" fill="#fff" stroke="#bbf7d0" stroke-width="2"/><rect x="856" y="510" width="78" height="26" rx="13" fill="#dcfce7"/><text x="895" y="528" text-anchor="middle" class="tag" fill="#15803d">선택</text><text x="856" y="569" class="card-title">호출 가능한 통합</text><text x="1062" y="567" class="body">반복 작업에 강제 인터페이스가 필요할 때</text><text x="856" y="600" class="small">사용 가능하다는 사실은 호출 권한이나 정당성이 아닙니다.</text></g>
  <path d="M800 652V704" stroke="#16a34a" stroke-width="5"/><g><rect x="278" y="704" width="1044" height="112" rx="28" fill="#14532d" filter="url(#shadow)"/><text x="318" y="752" class="base-title">직접 수행하는 HEAD가 기준선</text><text x="318" y="786" class="base-body">한 소유자가 요청을 이해하고 맞는 규모로 행동하며 결과를 검증하고, 필요의 근거 없이 절차를 늘리지 않습니다.</text></g>
</svg>
