<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">How HEAD is structured</title>
  <desc id="desc">A spatial architecture map with HEAD at the center. The User sits above as the single decision surface. Shared portable behavior is grouped on the left, project-owned authority and extensions on the right, and current session canon and retrieved evidence below. Solid lines represent stable authority or canon; dashed lines represent capabilities and evidence used on demand.</desc>
  <defs>
    <linearGradient id="headFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowSolid" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#334155"/>
    </marker>
    <marker id="arrowDemand" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#4f46e5"/>
    </marker>
    <style>
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .eyebrow { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 2px; fill: #4f46e5; }
      .region-title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .region-body { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .card-title { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .mini { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tag { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1px; }
      .head-title { font: 750 46px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .head-body { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #c7d2fe; }
      .head-chip { font: 650 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e0e7ff; }
      .legend { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .edge-label { font: 650 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="36" fill="#f8fafc"/>
  <path d="M0 0H1600V10H0z" fill="#4f46e5"/>
  <text x="64" y="72" class="eyebrow">A SPATIAL MAP OF OWNERSHIP AND CAPABILITY</text>
  <text x="64" y="124" class="title">How HEAD is structured</text>
  <text x="64" y="163" class="subtitle">HEAD is where portable behavior, project authority, and the current work agreement become one outcome.</text>

  <g transform="translate(1190 112)">
    <path d="M0 20H52" stroke="#334155" stroke-width="3" marker-end="url(#arrowSolid)"/>
    <text x="66" y="25" class="legend">stable authority or canon</text>
    <path d="M0 58H52" stroke="#4f46e5" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrowDemand)"/>
    <text x="66" y="63" class="legend">used on demand</text>
  </g>

  <path d="M800 292V382" stroke="#334155" stroke-width="4" marker-start="url(#arrowSolid)" marker-end="url(#arrowSolid)"/>
  <path d="M510 386C552 386 568 416 612 438" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrowSolid)"/>
  <path d="M510 570C552 570 568 548 612 526" fill="none" stroke="#4f46e5" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrowDemand)"/>
  <path d="M1090 386C1048 386 1032 416 988 438" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrowSolid)"/>
  <path d="M1090 570C1048 570 1032 548 988 526" fill="none" stroke="#4f46e5" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrowDemand)"/>
  <path d="M666 738C666 686 706 648 728 600" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrowSolid)"/>
  <path d="M934 738C934 686 894 648 872 600" fill="none" stroke="#4f46e5" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrowDemand)"/>

  <text x="558" y="373" text-anchor="middle" class="edge-label">principles</text>
  <text x="558" y="606" text-anchor="middle" class="edge-label">capabilities</text>
  <text x="1042" y="373" text-anchor="middle" class="edge-label">authority</text>
  <text x="1042" y="606" text-anchor="middle" class="edge-label">extensions</text>
  <text x="650" y="706" text-anchor="middle" class="edge-label">agreement</text>
  <text x="950" y="706" text-anchor="middle" class="edge-label">evidence</text>

  <g>
    <rect x="594" y="198" width="412" height="94" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="618" y="220" width="78" height="50" rx="18" fill="#eef2ff"/>
    <text x="657" y="251" text-anchor="middle" class="mini">USER</text>
    <text x="724" y="237" class="card-title">Direction and material decisions</text>
    <text x="724" y="264" class="body">One conversational and decision surface</text>
  </g>

  <g>
    <rect x="54" y="245" width="456" height="448" rx="30" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
    <text x="86" y="292" class="region-title">Shared HEAD layer</text>
    <text x="86" y="319" class="region-body">Portable across projects</text>

    <rect x="86" y="345" width="392" height="112" rx="22" fill="#ffffff" stroke="#a5f3fc" stroke-width="2"/>
    <rect x="106" y="365" width="76" height="26" rx="13" fill="#cffafe"/>
    <text x="144" y="383" text-anchor="middle" class="tag" fill="#0e7490">STABLE</text>
    <text x="106" y="417" class="card-title">HEAD Core</text>
    <text x="106" y="443" class="body">ownership and reasoning principles</text>

    <rect x="86" y="480" width="392" height="174" rx="22" fill="#ffffff" stroke="#a5f3fc" stroke-width="2"/>
    <rect x="106" y="500" width="104" height="26" rx="13" fill="#eef2ff"/>
    <text x="158" y="518" text-anchor="middle" class="tag" fill="#4338ca">ON DEMAND</text>
    <text x="106" y="556" class="card-title">Reusable capabilities</text>
    <rect x="106" y="579" width="104" height="48" rx="16" fill="#ecfeff"/>
    <rect x="228" y="579" width="104" height="48" rx="16" fill="#ecfeff"/>
    <rect x="350" y="579" width="104" height="48" rx="16" fill="#ecfeff"/>
    <text x="158" y="609" text-anchor="middle" class="mini">MCP</text>
    <text x="280" y="609" text-anchor="middle" class="mini">Skills</text>
    <text x="402" y="609" text-anchor="middle" class="mini">Agents</text>
  </g>

  <g>
    <rect x="1090" y="245" width="456" height="448" rx="30" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="1122" y="292" class="region-title">Project-owned layer</text>
    <text x="1122" y="319" class="region-body">Local authority and specialization</text>

    <rect x="1122" y="345" width="392" height="112" rx="22" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="1142" y="365" width="76" height="26" rx="13" fill="#dcfce7"/>
    <text x="1180" y="383" text-anchor="middle" class="tag" fill="#15803d">STABLE</text>
    <text x="1142" y="421" class="card-title">Core + information index</text>
    <text x="1142" y="445" class="body">rules, authority, and routes to evidence</text>

    <rect x="1122" y="480" width="392" height="174" rx="22" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="1142" y="500" width="104" height="26" rx="13" fill="#eef2ff"/>
    <text x="1194" y="518" text-anchor="middle" class="tag" fill="#4338ca">ON DEMAND</text>
    <text x="1142" y="556" class="card-title">Project extensions</text>
    <rect x="1142" y="579" width="104" height="48" rx="16" fill="#f0fdf4"/>
    <rect x="1264" y="579" width="104" height="48" rx="16" fill="#f0fdf4"/>
    <rect x="1386" y="579" width="104" height="48" rx="16" fill="#f0fdf4"/>
    <text x="1194" y="609" text-anchor="middle" class="mini">MCP</text>
    <text x="1316" y="609" text-anchor="middle" class="mini">Skills</text>
    <text x="1438" y="609" text-anchor="middle" class="mini">Agents</text>
  </g>

  <g>
    <rect x="612" y="382" width="376" height="218" rx="34" fill="url(#headFill)" filter="url(#shadow)"/>
    <rect x="648" y="414" width="132" height="30" rx="15" fill="#4338ca"/>
    <text x="714" y="435" text-anchor="middle" class="head-chip">CONTROL PLANE</text>
    <text x="648" y="494" class="head-title">HEAD</text>
    <text x="648" y="531" class="head-body">Owns the whole outcome</text>
    <rect x="648" y="554" width="138" height="30" rx="15" fill="#3730a3"/>
    <rect x="798" y="554" width="154" height="30" rx="15" fill="#3730a3"/>
    <text x="717" y="574" text-anchor="middle" class="head-chip">model + context</text>
    <text x="875" y="574" text-anchor="middle" class="head-chip">verify + integrate</text>
  </g>

  <g>
    <rect x="490" y="738" width="620" height="208" rx="30" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="522" y="781" class="region-title">Current work</text>
    <text x="522" y="808" class="region-body">The agreement and evidence for this outcome</text>

    <rect x="522" y="829" width="258" height="96" rx="20" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="542" y="847" width="76" height="24" rx="12" fill="#ffedd5"/>
    <text x="580" y="864" text-anchor="middle" class="tag" fill="#c2410c">STABLE</text>
    <text x="542" y="891" class="card-title">Session canon</text>
    <text x="542" y="915" class="body">context.md + run.md</text>

    <rect x="810" y="829" width="268" height="96" rx="20" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="830" y="847" width="104" height="24" rx="12" fill="#eef2ff"/>
    <text x="882" y="864" text-anchor="middle" class="tag" fill="#4338ca">ON DEMAND</text>
    <text x="830" y="891" class="card-title">Retrieved evidence</text>
    <text x="830" y="915" class="body">code, documents, data, behavior</text>
  </g>
</svg>
