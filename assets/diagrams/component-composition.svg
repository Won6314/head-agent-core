<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950" role="img" aria-labelledby="title desc">
  <title id="title">How the components compose</title>
  <desc id="desc">Portable Core and project context, plus runtime canon when continuity matters, form HEAD's stable work basis. HEAD selectively loads a Skill, calls an MCP, or assigns a bounded Agent only when the outcome needs it. Results and direct evidence return to HEAD for verification and integration. Component availability does not grant decision authority.</desc>
  <defs>
    <linearGradient id="headFill" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#172554"/><stop offset="1" stop-color="#312e81"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.1"/></filter>
    <marker id="solidArrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L11,5.5 L0,11 z" fill="#334155"/></marker>
    <marker id="demandArrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L11,5.5 L0,11 z" fill="#4f46e5"/></marker>
    <style>
      .title{font:700 42px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.subtitle{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}.eyebrow{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:2px;fill:#4f46e5}.region{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.region-body{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#64748b}.card-title{font:700 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.body{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#64748b}.tag{font:700 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:1px}.head-title{font:750 44px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}.head-body{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#c7d2fe}.head-small{font:650 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#e0e7ff}.note{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}
    </style>
  </defs>
  <rect width="1600" height="950" rx="36" fill="#f8fafc"/><path d="M0 0H1600V10H0z" fill="#4f46e5"/>
  <text x="64" y="72" class="eyebrow">DIFFERENT COMPONENTS, DIFFERENT RESPONSIBILITIES</text><text x="64" y="124" class="title">How the components compose</text><text x="64" y="163" class="subtitle">Stable authority grounds the work. Procedures, interfaces, and outcome owners appear only when needed.</text>

  <rect x="88" y="210" width="1424" height="236" rx="30" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/><text x="120" y="252" class="region">Stable work basis</text><text x="120" y="279" class="region-body">HEAD composes the authority available for this outcome</text>
  <g><rect x="120" y="307" width="406" height="104" rx="22" fill="#fff" stroke="#c7d2fe" stroke-width="2"/><text x="148" y="346" class="card-title">Portable Core</text><text x="148" y="376" class="body">ownership and reasoning principles</text></g>
  <g><rect x="597" y="307" width="406" height="104" rx="22" fill="#fff" stroke="#bbf7d0" stroke-width="2"/><text x="625" y="346" class="card-title">Project context</text><text x="625" y="376" class="body">rules, index, authority, evidence routes</text></g>
  <g><rect x="1074" y="307" width="406" height="104" rx="22" fill="#fff" stroke="#fed7aa" stroke-width="2"/><text x="1102" y="346" class="card-title">Durable-work canon</text><text x="1102" y="376" class="body">the agreement when continuity matters</text></g>

  <path d="M323 411V467H402M800 411V467H402M1277 411V467H402V505" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#solidArrow)"/>
  <g><rect x="186" y="505" width="432" height="238" rx="32" fill="url(#headFill)" filter="url(#shadow)"/><rect x="222" y="539" width="132" height="30" rx="15" fill="#4338ca"/><text x="288" y="560" text-anchor="middle" class="head-small">CONTROL PLANE</text><text x="222" y="620" class="head-title">HEAD</text><text x="222" y="660" class="head-body">Selects, composes, verifies, integrates.</text><text x="222" y="701" class="head-small">Not every outcome needs every component.</text></g>

  <path d="M618 624H758" stroke="#4f46e5" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#demandArrow)"/><text x="688" y="604" text-anchor="middle" class="note">use when relevant</text>
  <rect x="774" y="486" width="738" height="276" rx="30" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/><text x="806" y="529" class="region">On-demand execution</text><text x="806" y="556" class="region-body">HEAD chooses the matching mechanism without transferring project authority</text>
  <g><rect x="806" y="588" width="210" height="132" rx="22" fill="#fff" stroke="#a5f3fc" stroke-width="2"/><rect x="830" y="610" width="62" height="25" rx="12" fill="#cffafe"/><text x="861" y="627" text-anchor="middle" class="tag" fill="#0e7490">SKILL</text><text x="830" y="669" class="card-title">Procedure</text><text x="830" y="697" class="body">guides the method</text></g>
  <g><rect x="1038" y="588" width="210" height="132" rx="22" fill="#fff" stroke="#a5f3fc" stroke-width="2"/><rect x="1062" y="610" width="62" height="25" rx="12" fill="#cffafe"/><text x="1093" y="627" text-anchor="middle" class="tag" fill="#0e7490">MCP</text><text x="1062" y="669" class="card-title">Interface</text><text x="1062" y="697" class="body">performs a bounded call</text></g>
  <g><rect x="1270" y="588" width="210" height="132" rx="22" fill="#fff" stroke="#a5f3fc" stroke-width="2"/><rect x="1294" y="610" width="70" height="25" rx="12" fill="#cffafe"/><text x="1329" y="627" text-anchor="middle" class="tag" fill="#0e7490">AGENT</text><text x="1294" y="669" class="card-title">Outcome owner</text><text x="1294" y="697" class="body">returns a result</text></g>

  <path d="M1143 762V802" stroke="#334155" stroke-width="3" marker-end="url(#solidArrow)"/><rect x="498" y="802" width="804" height="94" rx="24" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/><text x="532" y="840" class="card-title">Result and direct evidence</text><text x="532" y="870" class="body">HEAD checks this against the agreement before it becomes a canonical conclusion.</text><path d="M498 849H390C342 849 326 804 354 753" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#solidArrow)"/>
</svg>
