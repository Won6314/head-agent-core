<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">Adoption capability choices</title>
  <desc id="desc">Direct HEAD work is the baseline. Four optional capabilities—durable run, bounded workers, independent review, and callable integrations—can be added independently when observed work creates the corresponding need. This is not a maturity ladder, and more components are not inherently better.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.1"/></filter>
    <style>.title{font:700 42px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.subtitle{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}.eyebrow{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:2px;fill:#16a34a}.region{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.card-title{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.body{font:400 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#64748b}.small{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}.tag{font:700 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:1px}.base-title{font:750 30px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}.base-body{font:400 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#dcfce7}</style>
  </defs>
  <rect width="1600" height="860" rx="36" fill="#f8fafc"/><path d="M0 0H1600V10H0z" fill="#16a34a"/>
  <text x="64" y="72" class="eyebrow">ADOPT THE LEAST COMPLEX SYSTEM THAT FITS</text><text x="64" y="124" class="title">Adoption capability choices</text><text x="64" y="163" class="subtitle">Capabilities respond to observed needs. They are options that can combine, not levels to climb.</text>
  <g><rect x="1192" y="82" width="344" height="92" rx="24" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/><text x="1224" y="119" class="card-title">Not a maturity ladder</text><text x="1224" y="148" class="body">More machinery is not a better system.</text></g>

  <rect x="116" y="222" width="1368" height="430" rx="32" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/><text x="152" y="266" class="region">Optional capabilities</text><text x="152" y="294" class="body">Add one when its specific coordination, continuity, review, or interface need appears.</text>
  <g filter="url(#shadow)"><rect x="152" y="326" width="620" height="136" rx="24" fill="#fff" stroke="#bbf7d0" stroke-width="2"/><rect x="180" y="350" width="78" height="26" rx="13" fill="#dcfce7"/><text x="219" y="368" text-anchor="middle" class="tag" fill="#15803d">OPTIONAL</text><text x="180" y="409" class="card-title">Durable run</text><text x="360" y="407" class="body">when continuity or handoff matters</text><text x="180" y="440" class="small">Adds a stable agreement and checklist; summaries remain subordinate.</text></g>
  <g filter="url(#shadow)"><rect x="828" y="326" width="620" height="136" rx="24" fill="#fff" stroke="#bbf7d0" stroke-width="2"/><rect x="856" y="350" width="78" height="26" rx="13" fill="#dcfce7"/><text x="895" y="368" text-anchor="middle" class="tag" fill="#15803d">OPTIONAL</text><text x="856" y="409" class="card-title">Bounded workers</text><text x="1066" y="407" class="body">when one separate result has a clear owner</text><text x="856" y="440" class="small">Adds delegation setup and integration cost.</text></g>
  <g filter="url(#shadow)"><rect x="152" y="486" width="620" height="136" rx="24" fill="#fff" stroke="#bbf7d0" stroke-width="2"/><rect x="180" y="510" width="78" height="26" rx="13" fill="#dcfce7"/><text x="219" y="528" text-anchor="middle" class="tag" fill="#15803d">OPTIONAL</text><text x="180" y="569" class="card-title">Independent review</text><text x="390" y="567" class="body">when separate judgment can change the result</text><text x="180" y="600" class="small">Adds challenge, not an automatic approval stamp.</text></g>
  <g filter="url(#shadow)"><rect x="828" y="486" width="620" height="136" rx="24" fill="#fff" stroke="#bbf7d0" stroke-width="2"/><rect x="856" y="510" width="78" height="26" rx="13" fill="#dcfce7"/><text x="895" y="528" text-anchor="middle" class="tag" fill="#15803d">OPTIONAL</text><text x="856" y="569" class="card-title">Callable integrations</text><text x="1082" y="567" class="body">when repetition needs an enforced interface</text><text x="856" y="600" class="small">Availability is not authority or justification to call.</text></g>

  <path d="M800 652V704" stroke="#16a34a" stroke-width="5"/><g><rect x="278" y="704" width="1044" height="112" rx="28" fill="#14532d" filter="url(#shadow)"/><text x="318" y="752" class="base-title">Direct HEAD is the baseline</text><text x="318" y="786" class="base-body">One owner understands the request, acts at the right scale, verifies the result, and adds no ceremony without evidence of need.</text></g>
</svg>
