<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950" role="img" aria-labelledby="title desc">
  <title id="title">구성 요소의 조합</title>
  <desc id="desc">이식 가능한 Core와 프로젝트 컨텍스트, 그리고 연속성이 중요할 때 사용하는 런타임 정본이 HEAD의 안정적 작업 기반을 이룹니다. HEAD는 결과에 필요할 때만 Skill을 로드하고, MCP를 호출하거나, 경계가 정해진 Agent에게 결과를 맡깁니다. 결과와 직접 근거는 검증과 통합을 위해 HEAD로 돌아옵니다. 구성 요소가 있다는 사실은 의사결정 권한을 주지 않습니다.</desc>
  <defs>
    <linearGradient id="headFill" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#172554"/><stop offset="1" stop-color="#312e81"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.1"/></filter><marker id="solidArrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L11,5.5 L0,11 z" fill="#334155"/></marker><marker id="demandArrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L11,5.5 L0,11 z" fill="#4f46e5"/></marker>
    <style>.title{font:700 42px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#0f172a}.subtitle{font:400 20px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#475569}.eyebrow{font:700 15px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;letter-spacing:2px;fill:#4f46e5}.region{font:700 22px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#0f172a}.region-body{font:400 15px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#64748b}.card-title{font:700 20px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#0f172a}.body{font:400 15px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#64748b}.tag{font:700 12px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;letter-spacing:1px}.head-title{font:750 44px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#fff}.head-body{font:400 18px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#c7d2fe}.head-small{font:650 14px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#e0e7ff}.note{font:600 14px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#475569}</style>
  </defs>
  <rect width="1600" height="950" rx="36" fill="#f8fafc"/><path d="M0 0H1600V10H0z" fill="#4f46e5"/><text x="64" y="72" class="eyebrow">서로 다른 구성 요소, 서로 다른 책임</text><text x="64" y="124" class="title">구성 요소의 조합</text><text x="64" y="163" class="subtitle">안정적 권위가 작업의 기반이 되고, 절차·인터페이스·결과 소유자는 필요할 때만 나타납니다.</text>
  <rect x="88" y="210" width="1424" height="236" rx="30" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/><text x="120" y="252" class="region">안정적 작업 기반</text><text x="120" y="279" class="region-body">HEAD가 현재 결과에 사용할 권위를 구성합니다</text>
  <g><rect x="120" y="307" width="406" height="104" rx="22" fill="#fff" stroke="#c7d2fe" stroke-width="2"/><text x="148" y="346" class="card-title">이식 가능한 Core</text><text x="148" y="376" class="body">소유권과 추론 원칙</text></g><g><rect x="597" y="307" width="406" height="104" rx="22" fill="#fff" stroke="#bbf7d0" stroke-width="2"/><text x="625" y="346" class="card-title">프로젝트 컨텍스트</text><text x="625" y="376" class="body">규칙, 인덱스, 권위, 근거 경로</text></g><g><rect x="1074" y="307" width="406" height="104" rx="22" fill="#fff" stroke="#fed7aa" stroke-width="2"/><text x="1102" y="346" class="card-title">오래 유지되는 작업 정본</text><text x="1102" y="376" class="body">연속성이 중요할 때 쓰는 작업 합의</text></g>
  <path d="M323 411V467H402M800 411V467H402M1277 411V467H402V505" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#solidArrow)"/>
  <g><rect x="186" y="505" width="432" height="238" rx="32" fill="url(#headFill)" filter="url(#shadow)"/><rect x="222" y="539" width="132" height="30" rx="15" fill="#4338ca"/><text x="288" y="560" text-anchor="middle" class="head-small">조정 계층</text><text x="222" y="620" class="head-title">HEAD</text><text x="222" y="660" class="head-body">선택하고, 구성하고, 검증하고, 통합합니다.</text><text x="222" y="701" class="head-small">모든 결과가 모든 구성 요소를 필요로 하지는 않습니다.</text></g>
  <path d="M618 624H758" stroke="#4f46e5" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#demandArrow)"/><text x="688" y="604" text-anchor="middle" class="note">관련 있을 때 사용</text>
  <rect x="774" y="486" width="738" height="276" rx="30" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/><text x="806" y="529" class="region">필요할 때 실행</text><text x="806" y="556" class="region-body">HEAD는 프로젝트 권위를 넘기지 않고 맞는 메커니즘을 선택합니다</text>
  <g><rect x="806" y="588" width="210" height="132" rx="22" fill="#fff" stroke="#a5f3fc" stroke-width="2"/><rect x="830" y="610" width="62" height="25" rx="12" fill="#cffafe"/><text x="861" y="627" text-anchor="middle" class="tag" fill="#0e7490">SKILL</text><text x="830" y="669" class="card-title">절차</text><text x="830" y="697" class="body">방법을 안내함</text></g><g><rect x="1038" y="588" width="210" height="132" rx="22" fill="#fff" stroke="#a5f3fc" stroke-width="2"/><rect x="1062" y="610" width="62" height="25" rx="12" fill="#cffafe"/><text x="1093" y="627" text-anchor="middle" class="tag" fill="#0e7490">MCP</text><text x="1062" y="669" class="card-title">인터페이스</text><text x="1062" y="697" class="body">경계 있는 호출을 수행</text></g><g><rect x="1270" y="588" width="210" height="132" rx="22" fill="#fff" stroke="#a5f3fc" stroke-width="2"/><rect x="1294" y="610" width="70" height="25" rx="12" fill="#cffafe"/><text x="1329" y="627" text-anchor="middle" class="tag" fill="#0e7490">AGENT</text><text x="1294" y="669" class="card-title">결과 소유자</text><text x="1294" y="697" class="body">결과를 반환함</text></g>
  <path d="M1143 762V802" stroke="#334155" stroke-width="3" marker-end="url(#solidArrow)"/><rect x="498" y="802" width="804" height="94" rx="24" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/><text x="532" y="840" class="card-title">결과와 직접 근거</text><text x="532" y="870" class="body">HEAD가 합의와 대조한 뒤에만 정본 결론이 됩니다.</text><path d="M498 849H390C342 849 326 804 354 753" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#solidArrow)"/>
</svg>
