<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">오래 유지되는 작업 합의</title>
  <desc id="desc">사용자가 확정한 방향은 두 개의 권위 있는 기록으로 보존됩니다. context.md는 안정적인 세션 정체성을 유지합니다. run.md는 범위, 성공 조건, 결정, 체크리스트, 가정, 현재 위치, 다음 행동, 근거를 포함한 전체 사용자-HEAD 합의를 유지합니다. progress와 history는 하위 검색 기록이며 두 파일의 권위를 덮어쓰지 못합니다.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.1"/></filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L11,5.5 L0,11 z" fill="#334155"/></marker>
    <style>
      .title{font:700 42px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#0f172a}.subtitle{font:400 20px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#475569}.eyebrow{font:700 15px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;letter-spacing:2px;fill:#ea580c}.region{font:700 16px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;letter-spacing:1px;fill:#9a3412}.card-title{font:700 25px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#0f172a}.body{font:400 16px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#64748b}.small-title{font:700 17px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#334155}.small{font:400 14px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;fill:#64748b}.tag{font:700 12px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;letter-spacing:1px}.record{font:700 20px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#0f172a}
    </style>
  </defs>
  <rect width="1600" height="900" rx="36" fill="#f8fafc"/><path d="M0 0H1600V10H0z" fill="#ea580c"/>
  <text x="64" y="72" class="eyebrow">모델 기억이 아닌 복구 권위</text>
  <text x="64" y="124" class="title">오래 유지되는 작업 합의</text>
  <text x="64" y="163" class="subtitle">권위가 손실 있는 요약 밖에 있기 때문에 중단 후에도 원래 목표가 유지됩니다.</text>

  <path d="M800 284V331" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g><rect x="500" y="198" width="600" height="86" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/><text x="540" y="235" class="card-title">사용자가 확정한 방향</text><text x="540" y="263" class="body">문제, 목표, 중요한 결정, 성공의 의미</text></g>

  <rect x="116" y="332" width="1368" height="416" rx="32" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/><text x="152" y="374" class="region">두 파일의 권위</text>
  <g><rect x="154" y="402" width="420" height="296" rx="28" fill="#ffffff" stroke="#fed7aa" stroke-width="2" filter="url(#shadow)"/><rect x="186" y="434" width="82" height="28" rx="14" fill="#ffedd5"/><text x="227" y="453" text-anchor="middle" class="tag" fill="#c2410c">안정적</text><text x="186" y="505" class="record">context.md</text><text x="186" y="546" class="card-title">세션 정체성</text><text x="186" y="582" class="body">안정적인 주제와 제약입니다.</text><text x="186" y="612" class="body">세션 자체가 바뀔 때만 변경합니다.</text><path d="M186 646H542" stroke="#fed7aa"/><text x="186" y="675" class="small">답하는 질문: “어떤 작업 안에 있는가?”</text></g>
  <g><rect x="618" y="382" width="828" height="336" rx="28" fill="#ffffff" stroke="#fdba74" stroke-width="3" filter="url(#shadow)"/><rect x="650" y="414" width="116" height="28" rx="14" fill="#ffedd5"/><text x="708" y="433" text-anchor="middle" class="tag" fill="#c2410c">전체 합의</text><text x="650" y="482" class="record">run.md</text><text x="650" y="516" class="body">전체 사용자-HEAD 합의와 복구 가능한 운영 위치입니다.</text>
    <rect x="650" y="548" width="238" height="130" rx="20" fill="#fff7ed"/><text x="674" y="582" class="small-title">고정된 목적지</text><text x="674" y="612" class="small">문제 · 목표 · 범위</text><text x="674" y="640" class="small">성공 조건</text>
    <rect x="912" y="548" width="238" height="130" rx="20" fill="#fff7ed"/><text x="936" y="582" class="small-title">확정된 판단</text><text x="936" y="612" class="small">결정 · 체크리스트</text><text x="936" y="640" class="small">가정 · 작업 관계</text>
    <rect x="1174" y="548" width="238" height="130" rx="20" fill="#fff7ed"/><text x="1198" y="582" class="small-title">정확한 계속점</text><text x="1198" y="612" class="small">현재 위치 · 다음 행동</text><text x="1198" y="640" class="small">근거 위치</text>
  </g>
  <path d="M800 748V780" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 7"/>
  <g><rect x="376" y="780" width="848" height="82" rx="24" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 7"/><text x="408" y="815" class="small-title">검색 기록이지 권위가 아님</text><text x="408" y="844" class="body">progress.md · history.md · 압축 요약 — 회상에는 유용하지만 context.md나 run.md를 덮어쓸 수 없음</text></g>
</svg>
