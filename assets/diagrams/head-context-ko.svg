<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">HEAD의 컨텍스트 구성</title>
  <desc id="desc">오래 유지되는 작업에 필요한 세션 정본을 포함한 작고 안정적인 권위 출처가 HEAD에 입력됩니다. HEAD는 권위 있는 근거와 절차를 필요할 때 검색해 전체 결과를 위한 작업 컨텍스트를 구성하고, 하나의 Agent에게는 경계가 정해진 결과에 필요한 가장 작은 완전한 브리프만 제공합니다.</desc>
  <defs>
    <linearGradient id="contextFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#115e59"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <marker id="arrowSlate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f766e"/>
    </marker>
    <style>
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #475569; }
      .eyebrow { font: 700 15px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; letter-spacing: 2px; fill: #0f766e; }
      .column { font: 700 17px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #334155; }
      .card-title { font: 700 21px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 400 16px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #64748b; }
      .small { font: 600 14px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #475569; }
      .head-title { font: 750 36px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #ffffff; }
      .head-body { font: 400 17px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #ccfbf1; }
      .head-chip { font: 650 14px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #ccfbf1; }
      .brief-title { font: 700 25px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #0f172a; }
      .brief-item { font: 600 14px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #334155; }
      .label { font: 650 14px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="36" fill="#f8fafc"/>
  <path d="M0 0H1600V10H0z" fill="#0f766e"/>

  <text x="72" y="78" class="eyebrow">컨텍스트는 관리되는 작업 집합</text>
  <text x="72" y="132" class="title">HEAD의 컨텍스트 구성</text>
  <text x="72" y="171" class="subtitle">안정적인 권위는 작게 유지하고, 결과를 바꿀 세부 정보만 검색한 뒤 Agent에 맞게 다시 좁힙니다.</text>

  <text x="72" y="225" class="column">안정적 권위 출처</text>
  <text x="606" y="225" class="column">HEAD가 구성</text>
  <text x="1174" y="225" class="column">필요할 때 검색</text>

  <g filter="url(#shadow)">
    <rect x="72" y="252" width="390" height="112" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="72" y="252" width="10" height="112" rx="5" fill="#4f46e5"/>
    <text x="110" y="294" class="card-title">공유 원칙</text>
    <text x="110" y="325" class="body">이식 가능한 소유권 및 추론 규칙</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="72" y="388" width="390" height="112" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="72" y="388" width="10" height="112" rx="5" fill="#16a34a"/>
    <text x="110" y="430" class="card-title">프로젝트 Core와 인덱스</text>
    <text x="110" y="461" class="body">로컬 규칙과 권위 출처 경로</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="72" y="524" width="390" height="128" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="72" y="524" width="10" height="128" rx="5" fill="#ea580c"/>
    <text x="110" y="566" class="card-title">오래 유지되는 작업 정본</text>
    <text x="110" y="597" class="body">연속성이 필요할 때</text>
    <text x="110" y="625" class="body">context.md와 run.md</text>
  </g>

  <path d="M462 308H572" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrowSlate)"/>
  <path d="M462 444H572" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrowSlate)"/>
  <path d="M462 588H572" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrowSlate)"/>

  <g filter="url(#shadow)">
    <rect x="590" y="252" width="438" height="400" rx="34" fill="url(#contextFill)"/>
    <rect x="626" y="286" width="151" height="32" rx="16" fill="#134e4a" stroke="#2dd4bf"/>
    <text x="701" y="308" text-anchor="middle" class="head-chip">작업 컨텍스트</text>
    <text x="626" y="373" class="head-title">HEAD는 전체를</text>
    <text x="626" y="415" class="head-title">판단할 만큼 봅니다.</text>
    <text x="626" y="465" class="head-body">현재 상태, 의도한 결과, 관계, 확정된 결정,</text>
    <text x="626" y="494" class="head-body">가정, 그리고 근거를 함께 봅니다.</text>

    <path d="M626 540H992" stroke="#5eead4" stroke-opacity="0.5"/>
    <text x="626" y="580" class="head-body">양보다 권위</text>
    <text x="626" y="610" class="head-body">이력보다 관련성</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1148" y="252" width="380" height="112" rx="24" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
    <text x="1184" y="294" class="card-title">정본 근거</text>
    <text x="1184" y="325" class="body">코드, 문서, 데이터, 관찰된 동작</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1148" y="388" width="380" height="112" rx="24" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
    <text x="1184" y="430" class="card-title">절차 또는 역량</text>
    <text x="1184" y="461" class="body">관련 있을 때 Skill을 로드하거나 MCP 호출</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1148" y="524" width="380" height="128" rx="24" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
    <text x="1184" y="566" class="card-title">프로젝트 세부 정보</text>
    <text x="1184" y="597" class="body">이 결과에 필요한 사실과 구현만 사용</text>
    <text x="1184" y="625" class="body">모든 결과의 정보를 넣지 않음</text>
  </g>

  <path d="M1148 308H1058" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrowTeal)"/>
  <path d="M1148 444H1058" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrowTeal)"/>
  <path d="M1148 588H1058" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrowTeal)"/>

  <g>
    <rect x="72" y="712" width="390" height="126" rx="24" fill="#fff1f2" stroke="#fecdd3" stroke-width="2" stroke-dasharray="8 7"/>
    <text x="108" y="752" class="card-title" fill="#9f1239">컨텍스트 덤프가 아님</text>
    <text x="108" y="783" class="body">복사된 이력, 낡은 요약,</text>
    <text x="108" y="811" class="body">모든 프로젝트 파일을 넣지 않음</text>
  </g>

  <path d="M809 652V692" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrowSlate)"/>
  <text x="830" y="683" class="label">소유권에 맞게 좁힘</text>

  <g filter="url(#shadow)">
    <rect x="590" y="708" width="938" height="130" rx="28" fill="#ffffff" stroke="#99f6e4" stroke-width="3"/>
    <text x="628" y="754" class="brief-title">하나의 Agent는 가장 작은 완전한 브리프를 받습니다</text>
    <rect x="628" y="782" width="114" height="34" rx="17" fill="#f0fdfa"/>
    <text x="685" y="804" text-anchor="middle" class="brief-item">목적</text>
    <rect x="754" y="782" width="160" height="34" rx="17" fill="#f0fdfa"/>
    <text x="834" y="804" text-anchor="middle" class="brief-item">확정된 결정</text>
    <rect x="926" y="782" width="116" height="34" rx="17" fill="#f0fdfa"/>
    <text x="984" y="804" text-anchor="middle" class="brief-item">근거</text>
    <rect x="1054" y="782" width="122" height="34" rx="17" fill="#f0fdfa"/>
    <text x="1115" y="804" text-anchor="middle" class="brief-item">경계</text>
    <rect x="1188" y="782" width="302" height="34" rx="17" fill="#f0fdfa"/>
    <text x="1339" y="804" text-anchor="middle" class="brief-item">관찰 가능한 완료</text>
  </g>
</svg>
